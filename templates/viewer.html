<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ filename }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 12px 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .topbar a { color: #888; text-decoration: none; font-size: 0.85rem; }
    .topbar a:hover { color: #fff; }
    .topbar .fname { color: #ccc; font-size: 0.9rem; flex: 1; }
    .topbar .dl-btn {
      background: #7c6aff; color: #fff;
      padding: 7px 16px; border-radius: 6px;
      font-size: 0.83rem; text-decoration: none;
    }
    .topbar .dl-btn:hover { background: #6a59e0; color: #fff; }

    .content {
      max-width: 780px;
      margin: 48px auto;
      padding: 0 24px 80px;
      line-height: 1.75;
    }

    /* Markdown styles */
    .content h1, .content h2, .content h3, .content h4 {
      color: #fff; margin: 1.6em 0 0.6em; font-weight: 600;
    }
    .content h1 { font-size: 2rem; border-bottom: 1px solid #2a2a2a; padding-bottom: 0.4em; }
    .content h2 { font-size: 1.5rem; border-bottom: 1px solid #222; padding-bottom: 0.3em; }
    .content h3 { font-size: 1.2rem; }
    .content p { margin: 0.8em 0; }
    .content a { color: #7c6aff; }
    .content strong { color: #fff; }
    .content ul, .content ol { padding-left: 1.6em; margin: 0.6em 0; }
    .content li { margin: 0.3em 0; }
    .content code {
      background: #1e1e1e; border: 1px solid #2a2a2a;
      padding: 2px 6px; border-radius: 4px;
      font-family: 'Consolas', monospace; font-size: 0.88em; color: #e0b0ff;
    }
    .content pre {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      padding: 16px; border-radius: 8px;
      overflow-x: auto; margin: 1em 0;
    }
    .content pre code {
      background: none; border: none; padding: 0;
      font-size: 0.9rem; color: #ccc;
    }
    .content blockquote {
      border-left: 3px solid #444;
      padding-left: 16px; margin: 1em 0; color: #999;
    }
    .content table {
      width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.9rem;
    }
    .content th, .content td {
      border: 1px solid #2a2a2a; padding: 8px 12px; text-align: left;
    }
    .content th { background: #1a1a1a; color: #fff; }
    .content tr:nth-child(even) { background: #141414; }
    .content hr { border: none; border-top: 1px solid #2a2a2a; margin: 2em 0; }
    .content img { max-width: 100%; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/">← Kembali</a>
    <span class="fname">{{ filename }}</span>
    <a class="dl-btn" href="/download/{{ filename }}">Download</a>
  </div>
  <div class="content">
    {{ content | safe }}
  </div>
</body>
</html>
